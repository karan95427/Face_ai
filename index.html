<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  color: #e5eefc;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 30%),
    radial-gradient(circle at top right, rgba(14, 165, 233, 0.12), transparent 24%),
    linear-gradient(180deg, #081120 0%, #0b1220 48%, #10192d 100%);
  padding: 32px 16px;
}

.page {
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
}

.hero {
  margin-bottom: 18px;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border: 1px solid rgba(148, 163, 184, 0.22);
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.45);
  color: #94a3b8;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

h2 {
  margin: 14px 0 8px;
  font-size: clamp(2rem, 4vw, 3.1rem);
  line-height: 1.05;
  letter-spacing: -0.04em;
}

.subtitle {
  margin: 0;
  max-width: 56ch;
  color: #94a3b8;
  line-height: 1.6;
}

.card {
  background: rgba(10, 16, 31, 0.74);
  border: 1px solid rgba(148, 163, 184, 0.16);
  box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
  backdrop-filter: blur(16px);
  border-radius: 24px;
  padding: 24px;
}

.field {
  margin-top: 18px;
}

.field label {
  display: block;
  margin-bottom: 8px;
  color: #cbd5e1;
  font-size: 14px;
  font-weight: 600;
}

input[type="text"] {
  width: 100%;
  padding: 16px 18px;
  border-radius: 16px;
  border: 1px solid rgba(148, 163, 184, 0.2);
  background: rgba(15, 23, 42, 0.9);
  color: #f8fafc;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
}

input[type="text"]::placeholder {
  color: #64748b;
}

input[type="text"]:focus {
  border-color: rgba(96, 165, 250, 0.9);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.16);
  transform: translateY(-1px);
}

.file-wrap {
  margin-top: 18px;
  padding: 18px;
  border-radius: 18px;
  border: 1px dashed rgba(96, 165, 250, 0.35);
  background: linear-gradient(180deg, rgba(15, 23, 42, 0.72), rgba(15, 23, 42, 0.48));
}

input[type="file"] {
  width: 100%;
  color: #cbd5e1;
  font-size: 14px;
}

input[type="file"]::file-selector-button {
  margin-right: 14px;
  padding: 12px 16px;
  border: 0;
  border-radius: 12px;
  background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
  color: white;
  font-weight: 700;
  cursor: pointer;
}

.preview {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 12px;
  margin-top: 18px;
}

.preview img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 12px 30px rgba(2, 6, 23, 0.22);
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 16px 18px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #60a5fa 0%, #2563eb 55%, #1d4ed8 100%);
  color: white;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.02em;
  cursor: pointer;
  box-shadow: 0 16px 30px rgba(37, 99, 235, 0.28);
  transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
}

button:hover {
  transform: translateY(-1px);
  filter: brightness(1.04);
  box-shadow: 0 20px 38px rgba(37, 99, 235, 0.34);
}

button:active {
  transform: translateY(0);
}

#status {
  margin: 16px 2px 0;
  min-height: 24px;
  color: #93c5fd;
  font-size: 14px;
}

@media (max-width: 640px) {
  body {
    padding: 18px 12px;
  }

  .card {
    padding: 18px;
    border-radius: 20px;
  }

  h2 {
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="page">
  <div class="hero">
    <div class="eyebrow">Face Enrollment</div>
    <h2>Enroll Person</h2>
    <p class="subtitle">Add a name, select one or more face images, and submit them to build a cleaner enrollment set.</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="personName">Person name</label>
      <input id="personName" name="name" type="text" placeholder="Enter Name">
    </div>

    <div class="field file-wrap">
      <label for="images">Reference images</label>
      <input type="file" id="images" multiple accept="image/*">
      <div id="preview" class="preview"></div>
    </div>

    <button onclick="upload()">Enroll</button>

    <p id="status"></p>
  </div>
</div>
<script>
const preview = document.getElementById("preview");
const imagesInput = document.getElementById("images");
const statusText = document.getElementById("status");

imagesInput.onchange = () => {
  preview.innerHTML = "";
  [...imagesInput.files].forEach(file => {
    let img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
};

async function upload() {
  const form = new FormData();
  const personName = document.getElementById("personName").value.trim();
  form.append("name", personName);

  for (let f of imagesInput.files) {
    form.append("files", f);
  }

  const res = await fetch("http://localhost:8000/enroll", {
    method: "POST",
    body: form
  });

  const data = await res.json();
  statusText.innerText = data.message;
}
</script>

</body>
</html>
